name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build-wheel:
    name: Build Python Wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      
      - name: Build wheel
        run: python -m build --wheel
      
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/*.whl

  build-windows-exe:
    name: Build Windows Executable
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e ".[windows,dev]"
      
      - name: Build executable with PyInstaller
        run: |
          pyinstaller work-context-sync.spec --clean --noconfirm
      
      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/work-context-sync.exe
      
      - name: Create ZIP distribution
        run: |
          Compress-Archive -Path "dist/work-context-sync.exe","config.example.json","README.md" -DestinationPath "dist/work-context-sync-windows.zip"
      
      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: dist/work-context-sync-windows.zip

  build-msi:
    name: Build Windows MSI Installer
    runs-on: windows-latest
    needs: build-windows-exe
    steps:
      - uses: actions/checkout@v4
      
      - name: Download executable
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: dist/
      
      - name: Install WiX
        run: |
          dotnet tool install --global wix --version 4.0.4
          wix extension add -g WixToolset.UI.wixext
      
      - name: Build MSI
        run: |
          wix build -o dist/work-context-sync.msi installer/wix/work-context-sync.wxs
      
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: dist/work-context-sync.msi

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-wheel, build-windows-exe, build-msi]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      
      - name: Display artifacts
        run: |
          ls -R artifacts/
      
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.ref_name || github.event.inputs.version }}
          draft: false
          prerelease: false
          files: |
            artifacts/wheel/*.whl
            artifacts/windows-zip/*.zip
            artifacts/windows-msi/*.msi
          body: |
            ## Work Context Sync ${{ github.ref_name || github.event.inputs.version }}
            
            ### Downloads
            
            | Platform | Package | Use Case |
            |----------|---------|----------|
            | **Windows (Recommended)** | `work-context-sync.msi` | Install via Windows Installer |
            | Windows Portable | `work-context-sync-windows.zip` | Extract and run, no install |
            | Python | `mtg_work_context_sync-*.whl` | `pip install` for Python users |
            
            ### Quick Start
            
            **MSI Installer**:
            ```powershell
            # Download and run work-context-sync.msi
            # Then in terminal:
            work-context-sync sync today
            ```
            
            **Portable ZIP**:
            ```powershell
            # Extract work-context-sync-windows.zip
            cd work-context-sync
            .\work-context-sync.exe sync today
            ```
            
            **Python Wheel**:
            ```powershell
            pip install mtg_work_context_sync-*.whl
            work-context-sync sync today
            ```
            
            ### Configuration
            
            1. Copy `config.example.json` to `config.json`
            2. Update `vault_path` to your knowledge graph location
            3. Run `work-context-sync sync today`
            4. Authenticate with Microsoft 365 (one-time)
            
            ### Security
            
            - Tokens stored with Windows DPAPI encryption
            - Single-tenant app (your org only)
            - No admin consent required
            
            See [full documentation](https://github.com/midtowntg/work-context-sync/wiki) for details.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
